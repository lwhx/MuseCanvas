services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: musecanvas
      POSTGRES_USER: musecanvas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U musecanvas -d musecanvas"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: [redis-server, --appendonly, "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    image: musecanvas-api:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: &backend-env
      NODE_ENV: production
      ALLOW_INSECURE_SMTP: ${ALLOW_INSECURE_SMTP:-false}
      DATABASE_URL: postgresql://musecanvas:${POSTGRES_PASSWORD}@postgres:5432/musecanvas
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      SMTP_ENCRYPTION_KEY: ${SMTP_ENCRYPTION_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-implicit_tls}
      SMTP_FROM: ${SMTP_FROM:-no-reply@musecanvas.local}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-${S3_ENDPOINT}}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-musecanvas}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-http://localhost:18080}
      OAUTH_CREDENTIALS_ENCRYPTION_KEY: ${OAUTH_CREDENTIALS_ENCRYPTION_KEY:-}
      PROVIDER_CREDENTIALS_ENCRYPTION_KEY: ${PROVIDER_CREDENTIALS_ENCRYPTION_KEY:-}
      PROMPT_TEMPLATE_INDEX_PATH: ${PROMPT_TEMPLATE_CONTAINER_INDEX_PATH:-/opt/musecanvas/prompt-templates/index.json}
    volumes:
      - ${PROMPT_TEMPLATE_HOST_DIR:-./prompt-templates}:/opt/musecanvas/prompt-templates:ro
    healthcheck:
      test: [CMD, wget, -qO-, http://localhost:3001/api/health/ready]
      interval: 5s
      timeout: 3s
      retries: 30

  worker:
    image: musecanvas-worker:latest
    depends_on:
      api:
        condition: service_healthy
    environment: *backend-env
    volumes:
      - ${PROMPT_TEMPLATE_HOST_DIR:-./prompt-templates}:/opt/musecanvas/prompt-templates:ro

  web:
    image: musecanvas-web:latest

  nginx:
    image: musecanvas-nginx:latest
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    ports:
      - "18080:80"

volumes:
  postgres_data: {}
  redis_data: {}
