services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: musecanvas
      POSTGRES_USER: musecanvas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: { test: [CMD-SHELL, "pg_isready -U musecanvas -d musecanvas"], interval: 3s, timeout: 3s, retries: 20 }
  redis:
    image: redis:7.4-alpine
    command: [redis-server, --appendonly, "yes"]
    volumes: [redis_data:/data]
    healthcheck: { test: [CMD, redis-cli, ping], interval: 3s, timeout: 3s, retries: 20 }
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment: { MINIO_ROOT_USER: "${S3_ACCESS_KEY_ID}", MINIO_ROOT_PASSWORD: "${S3_SECRET_ACCESS_KEY}" }
    volumes: [minio_data:/data]
    ports: ["9000:9000", "9001:9001"]
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on: { minio: { condition: service_started } }
    entrypoint: [sh, -c, "until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 2; done; mc mb --ignore-existing local/musecanvas"]
    environment: { MINIO_ROOT_USER: "${S3_ACCESS_KEY_ID}", MINIO_ROOT_PASSWORD: "${S3_SECRET_ACCESS_KEY}" }
  mailpit:
    image: axllent/mailpit:v1.27
    ports: ["8025:8025"]
  api:
    build: { context: ., dockerfile: infra/docker/api.Dockerfile }
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    environment: &backend-env
      NODE_ENV: production
      ALLOW_INSECURE_SMTP: "true"
      DATABASE_URL: postgresql://musecanvas:${POSTGRES_PASSWORD}@postgres:5432/musecanvas
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      COOKIE_SECURE: "false"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_TLS_MODE: none
      SMTP_FROM: no-reply@musecanvas.local
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: musecanvas
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-http://localhost:8080}
      OAUTH_CREDENTIALS_ENCRYPTION_KEY: ${OAUTH_CREDENTIALS_ENCRYPTION_KEY:-}
      PROVIDER_CREDENTIALS_ENCRYPTION_KEY: ${PROVIDER_CREDENTIALS_ENCRYPTION_KEY:-}
      PROMPT_TEMPLATE_INDEX_PATH: /opt/musecanvas/prompt-templates/index.json
    volumes:
      - ./.runtime/prompt-templates:/opt/musecanvas/prompt-templates:ro
    healthcheck: { test: [CMD, wget, -qO-, http://localhost:3001/api/health/ready], interval: 5s, timeout: 3s, retries: 30 }
  worker:
    build: { context: ., dockerfile: infra/docker/worker.Dockerfile }
    depends_on: { api: { condition: service_healthy } }
    environment: *backend-env
    volumes:
      - ./.runtime/prompt-templates:/opt/musecanvas/prompt-templates:ro
  web:
    build: { context: ., dockerfile: infra/docker/web.Dockerfile, args: { VITE_API_BASE_URL: "" } }
  nginx:
    build: { context: ., dockerfile: infra/docker/nginx.Dockerfile }
    depends_on: { api: { condition: service_healthy }, web: { condition: service_started } }
    ports: ["8080:80"]
volumes: { postgres_data: {}, redis_data: {}, minio_data: {} }
